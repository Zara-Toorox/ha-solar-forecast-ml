# ============================================================================
# Beispiel-Automation: Batterie-Sensoren automatisch konfigurieren
# ============================================================================
# Diese Automation führt die 1-Klick Auto-Konfiguration bei HA-Start aus

# Beispiel 1: Auto-Konfiguration bei Home Assistant Start
automation_battery_auto_config_on_start:
  alias: "Batterie-Sensoren bei Start auto-konfigurieren"
  description: "Konfiguriert Batterie-Sensoren automatisch bei jedem HA-Start"
  trigger:
    - platform: homeassistant
      event: start
  # Warte 60 Sekunden, damit alle Integrationen geladen sind
  delay:
    seconds: 60
  action:
    - service: solar_forecast_ml.auto_configure_battery
      data:
        integration: "anker_solix"  # Deine Integration
      response_variable: config_result
    - if:
        - condition: template
          value_template: "{{ config_result.success }}"
      then:
        # Erfolg - Sende Benachrichtigung
        - service: persistent_notification.create
          data:
            title: "✅ Batterie-Konfiguration erfolgreich"
            message: >
              Batterie-Sensoren wurden automatisch konfiguriert!

              Integration: {{ config_result.integration }}
              Sensoren konfiguriert: {{ config_result.applied.sensor_count }}

              {{ config_result.applied.message }}
      else:
        # Fehler - Sende Warnung
        - service: persistent_notification.create
          data:
            title: "⚠️ Batterie-Konfiguration fehlgeschlagen"
            message: >
              Auto-Konfiguration konnte nicht durchgeführt werden.

              Fehler: {{ config_result.error | default('Unbekannter Fehler') }}

              Bitte manuell konfigurieren oder Logs prüfen.

# ============================================================================
# Beispiel 2: Tägliche Überprüfung und Neu-Konfiguration
# ============================================================================
# Nützlich, wenn Sensoren sich ändern oder neue Geräte hinzugefügt werden

automation_battery_daily_check:
  alias: "Batterie-Sensoren täglich überprüfen"
  description: "Überprüft täglich, ob Batterie-Sensoren noch korrekt sind"
  trigger:
    - platform: time
      at: "06:00:00"  # Jeden Morgen um 6 Uhr
  action:
    # Erst Discovery ohne Apply (nur prüfen)
    - service: solar_forecast_ml.discover_battery_sensors
      data:
        integration: "anker_solix"
        auto_apply: false  # Nur prüfen, nicht anwenden
      response_variable: discovery_result

    # Wenn Sensoren gefunden wurden und valide sind
    - if:
        - condition: template
          value_template: "{{ discovery_result.validation.valid }}"
      then:
        - service: persistent_notification.create
          data:
            title: "✅ Batterie-Sensoren OK"
            message: >
              Alle {{ discovery_result.validation.discovered_count }} Batterie-Sensoren sind verfügbar und funktionieren.
      else:
        # Warnung - Sensoren fehlen oder sind nicht verfügbar
        - service: persistent_notification.create
          data:
            title: "⚠️ Batterie-Sensoren Problem"
            message: >
              Einige Batterie-Sensoren sind nicht verfügbar!

              Gefunden: {{ discovery_result.validation.discovered_count }}/{{ discovery_result.validation.required_count }}

              {% if discovery_result.validation.errors %}
              Fehler:
              {% for error in discovery_result.validation.errors %}
              - {{ error }}
              {% endfor %}
              {% endif %}

              Bitte Anker Solix Integration überprüfen.

# ============================================================================
# Beispiel 3: Button für manuelle Auto-Konfiguration (Dashboard)
# ============================================================================
# Erstelle einen Button in deinem Dashboard für 1-Klick Konfiguration

# 1. Erstelle ein Helper Script (script.yaml):
script_auto_config_battery:
  alias: "🔋 Batterie auto-konfigurieren"
  icon: mdi:battery-charging
  sequence:
    - service: solar_forecast_ml.auto_configure_battery
      data:
        integration: "anker_solix"
      response_variable: result
    - service: persistent_notification.create
      data:
        title: >
          {% if result.success %}
          ✅ Batterie konfiguriert
          {% else %}
          ❌ Konfiguration fehlgeschlagen
          {% endif %}
        message: >
          {% if result.success %}
          Batterie-Sensoren erfolgreich konfiguriert!

          Integration: {{ result.integration }}
          Sensoren: {{ result.applied.sensor_count }}
          {% else %}
          Fehler: {{ result.error | default('Unbekannt') }}
          {% endif %}

# 2. Füge den Button zu deinem Dashboard hinzu (Lovelace YAML):
