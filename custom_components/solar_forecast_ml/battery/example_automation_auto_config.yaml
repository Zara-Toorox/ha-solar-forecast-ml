# ============================================================================
# Beispiel 4: Benachrichtigung bei erfolgreicher Konfiguration
# ============================================================================

automation_battery_config_notification:
  alias: "Benachrichtigung nach Batterie-Konfiguration"
  description: "Sendet detaillierte Benachrichtigung nach Auto-Konfiguration"
  trigger:
    - platform: homeassistant
      event: start
  delay:
    seconds: 90  # Warte bis Integration geladen ist
  action:
    - service: solar_forecast_ml.auto_configure_battery
      response_variable: config
    - service: notify.mobile_app_iphone  # Ersetze mit deinem Gerät
      data:
        title: "🔋 Batterie-Management aktiv"
        message: >
          {% if config.success %}
          Deine Batterie-Sensoren wurden automatisch konfiguriert!

          📊 Details:
          - Integration: {{ config.integration }}
          - Sensoren: {{ config.applied.sensor_count }}
          - SOC: {{ states('sensor.solar_forecast_ml_battery_soc') }}%
          - Leistung: {{ states('sensor.solar_forecast_ml_battery_power') }}W

          Batterie-Management ist jetzt aktiv! ⚡
          {% else %}
          Batterie-Konfiguration fehlgeschlagen.
          Fehler: {{ config.error }}
          {% endif %}

# ============================================================================
# Beispiel 5: Automatische Konfiguration für mehrere Integrationen
# ============================================================================

automation_battery_multi_integration:
  alias: "Batterie auto-konfigurieren (alle Integrationen)"
  description: "Sucht automatisch nach allen unterstützten Integrationen"
  trigger:
    - platform: homeassistant
      event: start
  delay:
    seconds: 60
  action:
    # Keine Integration angeben → Automatische Suche!
    - service: solar_forecast_ml.auto_configure_battery
      # Kein 'integration' Parameter
      response_variable: result
    - service: persistent_notification.create
      data:
        title: "🔋 Auto-Konfiguration"
        message: >
          {% if result.success %}
          ✅ Erfolgreich konfiguriert!

          Erkannte Integration: {{ result.applied_integration | default(result.integration) }}
          Sensoren: {{ result.applied.sensor_count }}
          {% else %}
          ⚠️ Keine kompatible Integration gefunden.

          Unterstützt: Anker Solix, Huawei Solar, Fronius
          {% endif %}
