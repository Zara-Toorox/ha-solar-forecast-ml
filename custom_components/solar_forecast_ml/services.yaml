# ⚠️ DEVELOPER ONLY - Diese Services können das ML-System beschädigen!
# ============================================================================

force_retrain:
  name: "🚀 Retrain ML Model"
  description: >
    ╔══════════════════════════════════════════════════════════════════════════╗
    ║ ⚠️ NUR FÜR ENTWICKLER / DEVELOPER ONLY                                  ║
    ║ Führen Sie diesen Service NUR auf Anweisung des Supports aus!           ║
    ║ Unsachgemäße Nutzung kann zu Datenverlust und Systeminstabilität führen.║
    ╚══════════════════════════════════════════════════════════════════════════╝

    🚀 ADAPTIVE TRAINING - Ridge Regression + TinyLSTM Neural Network

    Forces immediate retraining of the Machine Learning model with adaptive algorithm selection.

    Training behavior:
    - < 100 samples → Ridge Regression (fast, stable)
    - ≥ 100 samples → TinyLSTM (accurate, temporal)
    - Automatic fallback to Ridge if LSTM fails
    - User can override via integration options

    Data sources:
    - hourly_predictions.json (main source with actual production)
    - weather_forecast_corrected.json (weather + precision corrections)
    - astronomy_cache.json (sun position, theoretical max, clear-sky radiation)

    Model storage:
    - Weights: /ml/model_state.json (~100 KB for LSTM, ~10 KB for Ridge)
    - Scaler: Embedded in model_state.json
    - Algorithm used: Stored in model_state.json (ridge/tiny_lstm)

    Use this service:
    - After collecting new production data (to improve accuracy)
    - After fixing solar_capacity configuration
    - To test LSTM vs Ridge performance
    - If automatic training (06:00 daily) failed
  fields: {}

reset_model:
  name: "⚠️ Reset ML Model"
  description: >
    ╔══════════════════════════════════════════════════════════════════════════╗
    ║ 🚨 GEFÄHRLICH / DANGEROUS - NUR FÜR ENTWICKLER / DEVELOPER ONLY         ║
    ║ Führen Sie diesen Service NUR auf Anweisung des Supports aus!           ║
    ║ ALLE gelernten Daten werden UNWIDERRUFLICH gelöscht!                    ║
    ╚══════════════════════════════════════════════════════════════════════════╝

    ⚠️ DESTRUCTIVE ACTION - Deletes all learned model weights!

    Resets the Machine Learning model to its initial untrained state.

    What this service does:
    - Deletes /ml/model_state.json (all learned weights + scaler)
    - Resets ML predictor to UNINITIALIZED state
    - Clears accuracy metrics and training sample count
    - Forces model to retrain from scratch on next training cycle

    Use this service:
    - After major configuration changes (solar_capacity, location)
    - If model produces consistently wrong predictions
    - To start fresh ML training
    - After corrupted model_state.json file

    What happens after reset:
    - Model will use Rule-Based predictions until retrained
    - Next training (06:00 or manual) will rebuild from scratch
    - All historical prediction accuracy data is lost
    - Requires ≥10 samples with actual production to retrain

    ⚠️ CAUTION: This action CANNOT be undone!
    Consider backing up /ml/model_state.json before resetting.

    Alternative: Use force_retrain service to keep model but retrain with latest data.
  fields: {}

# ============================================================================
# EMERGENCY SERVICES - Manual Day-End Task Execution
# ⚠️ DEVELOPER ONLY - Nur bei Systemfehlern und auf Anweisung verwenden!
# ============================================================================
# Use these services if automated day-end tasks fail or need manual triggering

run_all_day_end_tasks:
  name: "🌙 Run All Day-End Tasks"
  description: >
    ╔══════════════════════════════════════════════════════════════════════════╗
    ║ ⚠️ NUR FÜR ENTWICKLER / DEVELOPER ONLY                                  ║
    ║ Führen Sie diesen Service NUR auf Anweisung des Supports aus!           ║
    ║ Mehrfache Ausführung kann zu Datenkorruption führen!                    ║
    ╚══════════════════════════════════════════════════════════════════════════╝

    🌙 EMERGENCY SERVICE - Manual execution of complete 23:30 day-end workflow!

    Executes the COMPLETE 8-step sequence that runs automatically at 23:30 daily.

    Task sequence (8 steps - matches production/production_scheduled_tasks.py::end_of_day_workflow):
    1. Finalize Day (read solar_yield_today before midnight reset)
    2. Create Daily Summary (shadow analysis, ML accuracy metrics)
    3. Move to History (archive today's predictions)
    4. Update Yesterday Deviation (yesterday vs forecast comparison)
    5. Calculate Statistics (MAE, RMSE, R² metrics)
    6. Update RB Overall Correction (production-based factor)
    7. Night Cleanup (remove duplicates, zero samples)
    8. Pattern Learning (geometry corrections)

    What this service does:
    - Saves today's final production data before midnight
    - Analyzes prediction accuracy (hourly + daily)
    - Detects shadow patterns and obstructions
    - Learns panel geometry corrections (monthly)
    - Archives predictions to history
    - Cleans up data duplicates
    - Updates correction factors

    Use this service:
    - ⚠️ If automatic 23:30 task failed
    - Before midnight to manually save today's data
    - To trigger manually if automatic task failed
    - To trigger geometry learning manually

    Processing time: ~2-5 seconds (8 steps)

    Files affected:
    - daily_summaries.json (new entry for today with shadow analysis)
    - hourly_predictions.json (today moved to history section)
    - learned_patterns.json (geometry corrections updated)
    - coordinator_state.json (yesterday deviation updated)
    - hourly_samples.json (cleaned, duplicates removed)

    ⚠️ CAUTION: Run ONLY ONCE per day to avoid duplicate entries!
    This service calls: coordinator.scheduled_tasks.end_of_day_workflow()
  fields: {}

