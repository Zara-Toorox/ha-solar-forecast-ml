# ============================================================================
# Solar Forecast ML Integration - Service Definitions
# ============================================================================
# Service categories:
# - ML Services: Model training and management
# - Emergency Services: Manual day-end task execution
# - Testing Services: Essential testing and simulation
# - Collection & Cleanup: Data maintenance tasks
# - Astronomy Services: Solar calculations and cache management
# ============================================================================

# ============================================================================
# ML SERVICES - Machine Learning Model Management
# ============================================================================

force_retrain:
  name: Retrain ML Model (V2)
  description: >
    🚀 NEW V2 TRAINING - Uses hourly_predictions.json + astronomy_cache.json

    Forces immediate retraining of the Machine Learning model with the new V2 data structure.

    What's new in V2:
    - 44 features (vs 31 before)
    - 6 new astronomy features (clear_sky_radiation, theoretical_max, etc.)
    - Time features (day_of_year, season, etc.)
    - Better weather features (precipitation, dew_point, etc.)

    Expected improvements:
    - +10-20% accuracy (better astronomy + time features)
    - +15% stability (more context)
    - +25% realism (theoretical_max bounds)

    Data sources:
    - hourly_predictions.json (main source)
    - astronomy_cache.json (critical astronomy features)
    - hourly_samples.json (lag features only)

    This will automatically use V2 training (use_v2_training=True).
  fields: {}

reset_model:
  name: Reset ML Model
  description: >
    ⚠️ WARNING: This deletes all learned weights and requires the model to retrain from scratch!

    Resets the Machine Learning model to its initial state.
    Use with caution - this action cannot be undone.
  fields: {}

# ============================================================================
# EMERGENCY SERVICES - Manual Day-End Task Execution
# ============================================================================
# Use these services if automated day-end tasks fail or need manual triggering

run_all_day_end_tasks:
  name: Run All Day-End Tasks
  description: >
    ⚠️ EMERGENCY SERVICE - Use only if automated tasks fail!

    Execute complete day-end sequence: finalize → history → stats → cleanup.
    Use before midnight to save today's data if automated routine failed!
  fields: {}

calculate_stats:
  name: Calculate Statistics
  description: >
    ⚠️ EMERGENCY SERVICE - Use only if automated task fails!

    Manually calculate statistics (normally runs at 23:32).
    Computes accuracy metrics from historical data.
    Rate-limited to once per minute.
  fields: {}

# ============================================================================
# TESTING SERVICES - Essential Testing and Simulation
# ============================================================================
# These services replicate EXACTLY what happens at specific times.
# ⚠️ WARNING: Create backup before use - these modify forecast data!
# ============================================================================

test_morning_routine:
  name: "🧪 TEST: Analyze 6 AM Morning Predictions (Real Data)"
  description: >
    ⚠️ ANALYSIS SERVICE - No backup needed (read-only!)

    Analyzes the ACTUAL data that was used at 6:00 AM today.

    Code Reference: services/service_registry.py::_handle_test_morning_routine

    What this service does:
    1. Loads stored predictions from hourly_predictions.json (created at 06:00)
    2. Loads weather data from weather_cache.json (fetched at 06:00)
    3. Analyzes predicted best hour vs actual best hour
    4. Shows prediction accuracy and errors
    5. Compares ML/Rule blending effectiveness

    This service is READ-ONLY and uses REAL stored data from this morning's
    06:00 routine. Perfect for debugging why a certain hour was predicted
    as best.

    Use cases:
    - Debug: Why was hour X predicted as best?
    - Verify: Did the 06:00 routine work correctly?
    - Compare: Predicted vs actual production
    - Analyze: ML contribution and blending weights

    Data sources:
    - /stats/hourly_predictions.json (predictions created at 06:00)
    - /data/weather_cache.json (weather forecast from 06:00)
  fields: {}

test_best_hour:
  name: "🧪 TEST: Calculate Best Production Hour"
  description: >
    ⚠️ TESTING SERVICE - Creates backup before use recommended!

    Calculates which hour TODAY will have the highest solar production.

    Code Reference: ml/ml_best_hour_calculator_v2.py

    Strategy (Hybrid V2 Algorithm):
    1. BEST: Use ML hourly predictions (if available)
    2. FALLBACK: Use historical profile data
    3. EMERGENCY: Use solar noon calculation

    All methods are SUN-AWARE:
    - Integrates with sun.sun entity for sunrise/sunset
    - Filters hours outside production window
    - Adds 30-minute safety margins
    - Prevents unrealistic selections (e.g., 18:00 in November)

    This forecast helps with planning:
    - When to run appliances
    - When to charge batteries
    - When to expect peak production

    Result is saved to daily_forecasts.json and displayed in sensors.
  fields: {}

run_all_scheduled_tasks:
  name: "🧪 TEST: Run All Scheduled Tasks"
  description: >
    ⚠️ COMPREHENSIVE TESTING SERVICE - This runs ALL automated tasks!

    Executes ALL scheduled tasks in chronological order to simulate
    a complete day-night cycle for debugging.

    Task execution sequence (18 tasks total):
    1. [23:05] ML Training Check (Daily)
    2. [23:30] End-of-Day Workflow (Finalize + History + Stats + Cleanup)
    3. [00:00] Reset Expected Production
    4. [00:00:30] Midnight Forecast Rotation
    5. [03:00] Weekly ML Retraining (Sunday only)
    6. [06:00] Morning Forecast Update (includes best hour)
    7-9. [06:15, 06:30, 06:45] Forecast Retry Attempts
    10. [XX:00:05] Next Hour Forecast Update
    11. [XX:02] Hourly Sample Collection
    12-13. Battery Management Tasks (if enabled)

    Use this to verify all tasks work correctly without waiting for
    scheduled times. Perfect for integration testing.

    ⚠️ This service takes several minutes to complete!
  fields: {}

# ============================================================================
# COLLECTION & CLEANUP SERVICES - Data Maintenance
# ============================================================================

collect_hourly_sample:
  name: Collect Hourly Sample
  description: >
    Manually triggers the collection of an hourly sample for ML training.

    This will collect data for the PREVIOUS full hour:
    - Solar production (kWh)
    - Weather conditions (temperature, clouds, etc.)
    - External sensor data (if configured)

    The sample is saved to hourly_samples.json for ML model training.

    Normally this runs automatically at XX:02 every hour.
    Use this service to manually collect a sample if automatic collection failed.
  fields: {}

night_cleanup:
  name: Night Cleanup
  description: >
    Manually trigger night cleanup task (normally runs at 02:00).

    What this does:
    - Removes duplicate samples from hourly_samples.json
    - Removes zero-production samples (where solar production = 0 kWh)
    - Optimizes database for better ML training

    Useful for testing data cleanup logic or cleaning up corrupted data.
  fields: {}

reload_scheduled_tasks:
  name: Reload Scheduled Tasks
  description: >
    Re-register all scheduled task listeners.

    Use this service if you suspect that automatic scheduled tasks
    (hourly updates, morning forecast, end-of-day workflow) are not running.

    This service will:
    1. Cancel all existing scheduled task listeners
    2. Re-register all scheduled tasks:
       - 06:00 AM: Morning forecast update + hourly predictions creation
       - Every hour at :05: Hourly actuals update
       - 23:05 PM: ML training check
       - 23:30 PM: End of day workflow

    After running this service, scheduled tasks should resume automatically.
  fields: {}

# ============================================================================
# ASTRONOMY SERVICES - Independent Solar Calculations
# ============================================================================
# These services manage the astronomy cache which provides sun positions,
# solar radiation, and production windows independent of sun.sun entity.
# ============================================================================

build_astronomy_cache:
  name: "🌞 Build Astronomy Cache"
  description: >
    Build or rebuild the astronomy cache with solar position calculations.

    This service creates a comprehensive cache of astronomical data including:
    - Sun position (elevation, azimuth) for every hour (0-23)
    - Clear sky solar radiation (W/m²) using atmospheric physics model
    - Theoretical maximum PV output based on system capacity
    - Production windows (sunrise - 1h to sunset + 1h)
    - Solar noon, daylight hours, and day progress ratios

    The cache is used for:
    - ML feature engineering (8 new astronomy-based features)
    - Production window validation (replaces sun.sun dependency)
    - Realistic benchmarks (historical max vs theoretical max)
    - Offline operation (works for 7 days without sun.sun entity)

    Default settings:
    - days_back: 30 days (for historical analysis and debugging)
    - days_ahead: 7 days (for forecast planning)
    - system_capacity_kwp: from integration config

    Build time: ~5 seconds for 30 days (96% faster than old 730-day default)
    File size: ~250 KB for 30 days (95% smaller than old 5 MB)

    Location data: Automatically from Home Assistant configuration
    - Latitude, Longitude, Elevation, Timezone

    Cache file: /config/solar_forecast_ml/stats/astronomy_cache.json

    Use this service:
    - On first setup (runs automatically)
    - After changing location
    - After updating system capacity
    - To rebuild corrupted cache
    - To extend history range

    IMPORTANT: This service is I/O intensive. Avoid running during
    active ML training or other heavy operations.
  fields:
    days_back:
      description: "Days to calculate backwards from today (default: 30)"
      example: 30
      default: 30
      selector:
        number:
          min: 1
          max: 730
          mode: box
    days_ahead:
      description: "Days to calculate ahead from today (default: 7)"
      example: 7
      default: 7
      selector:
        number:
          min: 1
          max: 30
          mode: box

refresh_cache_today:
  name: "🔄 Refresh Cache for Today"
  description: >
    Refresh astronomy cache for today + next 7 days.

    This service updates the astronomy cache with fresh calculations
    for the current week. It's designed for daily maintenance.

    What this does:
    - Recalculates: Today + next 7 days
    - Updates: Sun positions, solar radiation, production windows
    - Preserves: Historical data (not recalculated)
    - Maintains: Max peak records (not overwritten)

    When this runs:
    - Automatically at 6:00 AM daily (planned)
    - Manually via this service call
    - After Home Assistant restart

    Why daily refresh:
    - Ensures accurate production windows for today
    - Updates forecast data for next week
    - Accounts for seasonal changes (sunrise/sunset shifts)
    - Maintains cache freshness

    Processing time: ~1 second (only 8 days recalculated)

    Use this service:
    - To manually refresh current week data
    - If automatic 6 AM task failed
    - After system capacity changes
    - To test cache refresh logic

    NOTE: This service does NOT rebuild historical data.
    Use build_astronomy_cache for full rebuilds.
  fields: {}
