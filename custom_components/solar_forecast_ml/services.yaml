# Solar Forecast ML Integration - Services

force_retrain:
  name: Retrain ML Model
  description: >
    Forces immediate retraining of the Machine Learning model using all available historical data.
    Useful after significant data changes or to manually trigger an update.
  fields: {} # No fields required

reset_model:
  name: Reset ML Model
  description: >
    Resets the Machine Learning model to its initial state.
    WARNING: This deletes all learned weights and requires the model to retrain from scratch.
    Use with caution.
  fields: {} # No fields required

# EMERGENCY SERVICES - Day-End Tasks
finalize_day:
  name: Finalize Current Day
  description: >
    EMERGENCY: Manually trigger day finalization (normally runs at 23:30).
    Saves today's forecast and actual values before midnight.
  fields: {}

move_to_history:
  name: Move Day to History
  description: >
    EMERGENCY: Manually move finalized day to history (normally runs at 23:31).
    Transfers current day data to historical records.
  fields: {}

calculate_stats:
  name: Calculate Statistics
  description: >
    EMERGENCY: Manually calculate statistics (normally runs at 23:32).
    Computes accuracy metrics from historical data.
  fields: {}

run_all_day_end_tasks:
  name: Run All Day-End Tasks
  description: >
    EMERGENCY: Execute complete day-end sequence (finalize → history → stats).
    Use before midnight to save today's data!
  fields: {}

# DEBUGGING SERVICE
trigger_6am_forecast:
  name: Trigger 6 AM Forecast Lock
  description: >
    DEBUGGING: Manually trigger the 6 AM forecast lock mechanism outside scheduled time.
    Executes set_expected_daily_production() to test morning forecast logic.
    Useful for debugging forecast persistence and lock behavior.
  fields: {}

forecast_day_after_tomorrow:
  name: Forecast Day After Tomorrow
  description: >
    Triggers the forecast for the day after tomorrow and updates the daily_forecasts attribute.
  fields: {}

collect_hourly_sample:
  name: Collect Hourly Sample
  description: >
    Manually triggers the collection of an hourly sample for ML training.
    This will collect data for the previous full hour and save it to hourly_samples.json.
  fields: {}