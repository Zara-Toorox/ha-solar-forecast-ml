# Solar Forecast ML Integration - Services

force_retrain:
  name: Retrain ML Model
  description: >
    Forces immediate retraining of the Machine Learning model using all available historical data.
    Useful after significant data changes or to manually trigger an update.
  fields: {} # No fields required

reset_model:
  name: Reset ML Model
  description: >
    Resets the Machine Learning model to its initial state.
    WARNING: This deletes all learned weights and requires the model to retrain from scratch.
    Use with caution.
  fields: {} # No fields required

# EMERGENCY SERVICES - Day-End Tasks
finalize_day:
  name: Finalize Current Day
  description: >
    EMERGENCY: Manually trigger day finalization (normally runs at 23:30).
    Saves today's forecast and actual values before midnight.
  fields: {}

move_to_history:
  name: Move Day to History
  description: >
    EMERGENCY: Manually move finalized day to history (normally runs at 23:31).
    Transfers current day data to historical records.
  fields: {}

calculate_stats:
  name: Calculate Statistics
  description: >
    EMERGENCY: Manually calculate statistics (normally runs at 23:32).
    Computes accuracy metrics from historical data.
  fields: {}

run_all_day_end_tasks:
  name: Run All Day-End Tasks
  description: >
    EMERGENCY: Execute complete day-end sequence (finalize → history → stats).
    Use before midnight to save today's data!
  fields: {}

# ===========================================================================================
# DEBUGGING SERVICES - Time-based Forecast Simulations (100% Code-Conformant)
# ===========================================================================================
# These services replicate EXACTLY what happens at specific times of day.
# The code is the truth - these services follow the code 1:1 for debugging.
# ===========================================================================================

debugging_6am_forecast:
  name: "DEBUG: 6 AM - Lock Today's Forecast"
  description: >
    DEBUGGING SERVICE: Simulates EXACTLY what happens at 6:00 AM for TODAY's forecast.

    Code Reference: coordinator.py:840-920 (set_expected_daily_production)

    What this service does:
    - Gets fresh forecast data for TODAY
    - LOCKS today's forecast with FORCE OVERWRITE (overwrites midnight fallback locks)
    - Saves to daily_forecasts.json with source "auto_6am"
    - This is the morning baseline forecast

    IMPORTANT: This service uses force_overwrite=True to override any existing locks
    (e.g., from midnight fallback). Use this if the 6 AM task was blocked by a previous lock.

    Use this to test the 6 AM forecast lock behavior without waiting until 6 AM.
  fields: {}

lock_today_forecast:
  name: "Manual Trigger: Lock Today's Forecast (6 AM Task)"
  description: >
    MANUAL SERVICE: Manually trigger the 6 AM forecast lock task.

    This service does EXACTLY the same as the automatic 6 AM task:
    - Gets the current forecast for TODAY
    - LOCKS today's forecast with FORCE OVERWRITE
    - Overwrites any existing locks (e.g., from midnight fallback)
    - Saves to daily_forecasts.json with source "auto_6am"

    Use this service from Developer Tools to manually trigger the 6 AM task
    if it failed or was blocked by an earlier lock.

    Example use case: If the midnight fallback locked the forecast and blocked
    the 6 AM update, use this service to force the correct 6 AM forecast.
  fields: {}

debugging_best_hour:
  name: "DEBUG: Calculate Best Hour (Today Forecast)"
  description: >
    DEBUGGING SERVICE: Predicts which hour TODAY will have the highest production.

    Code Reference: ml/ml_best_hour_calculator.py + coordinator.py:738-753

    What this service does:
    - PAST hours today: Uses actual measured values
    - FUTURE hours today: Uses weather forecast + historical profile
    - Finds the hour with maximum expected production TODAY
    - SAVES best hour to daily_forecasts.json

    This is a FORECAST for planning (e.g., when to run appliances):
    "At which hour should I expect peak production today?"

    Use this to test the best hour forecast logic.
  fields: {}

debugging_tomorrow_12pm:
  name: "DEBUG: 12 PM - Lock Tomorrow's Forecast"
  description: >
    DEBUGGING SERVICE: Simulates EXACTLY what happens at 12:00 PM for TOMORROW's forecast.

    Code Reference: coordinator.py:686-696 (_save_forecasts_to_storage, 12 PM block)

    What this service does:
    - Gets fresh forecast data for TOMORROW
    - LOCKS tomorrow's forecast (lock=True)
    - Prevents further updates until midnight rotation

    Use this to test the 12 PM forecast lock behavior.
  fields: {}

debugging_day_after_tomorrow_6am:
  name: "DEBUG: 6 AM - Save Day After Tomorrow (Unlocked)"
  description: >
    DEBUGGING SERVICE: Simulates EXACTLY what happens at 6:00 AM for DAY AFTER TOMORROW's forecast.

    Code Reference: coordinator.py:649-657 + 661-708 (day_after_tomorrow at 6 AM)

    What this service does:
    - Gets fresh forecast data for DAY AFTER TOMORROW
    - SAVES forecast but does NOT lock it (lock=False)
    - Allows updates throughout the day until 18:00

    IMPORTANT: At 6 AM, day after tomorrow is UNLOCKED (not locked until 18:00).
    This is the key difference from the old service which incorrectly locked it.

    Use this to test the 6 AM day after tomorrow forecast behavior.
  fields: {}

debugging_day_after_tomorrow_6pm:
  name: "DEBUG: 18 PM - Lock Day After Tomorrow's Forecast"
  description: >
    DEBUGGING SERVICE: Simulates EXACTLY what happens at 18:00 PM for DAY AFTER TOMORROW's forecast.

    Code Reference: coordinator.py:698-708 (_save_forecasts_to_storage, 18 PM block)

    What this service does:
    - Gets fresh forecast data for DAY AFTER TOMORROW
    - LOCKS day after tomorrow's forecast (lock=True)
    - Prevents further updates until midnight rotation

    Use this to test the 18 PM forecast lock behavior.
  fields: {}

collect_hourly_sample:
  name: Collect Hourly Sample
  description: >
    Manually triggers the collection of an hourly sample for ML training.
    This will collect data for the previous full hour and save it to hourly_samples.json.
  fields: {}

# MANUAL TEST SERVICES - Daily Tasks
night_cleanup:
  name: Night Cleanup
  description: >
    MANUAL TEST: Trigger night cleanup task (normally runs at 02:00).
    Removes duplicate samples and zero-production samples from the database.
    Useful for testing data cleanup logic.
  fields: {}

run_all_scheduled_tasks:
  name: Run All Scheduled Tasks (Testing)
  description: >
    TESTING SERVICE: Execute ALL scheduled tasks in chronological order.
    This simulates a complete day-night cycle for debugging.

    Task execution order:
    1. 23:00 - Battery Daily Rollup
    2. 23:15 - Fetch Electricity Prices (aWATTar)
    3. 23:30 - Finalize Current Day
    4. 23:31 - Move to History
    5. 23:32 - Calculate Statistics
    6. 23:45 - Reset Daily Data
    7. 00:01 - Battery Midnight Reset
    8. 02:00 - Night Cleanup (Remove duplicates & zero-production samples)
    9. 03:00 - ML Training (if ML mode available)
    10. 06:00 - Morning Prediction

    Use this to verify all tasks work correctly without waiting for scheduled times.
  fields: {}

generate_chart:
  name: Generate Forecast Chart
  description: >
    Generate a PNG chart visualizing forecast vs actual production data.
    The chart is saved to /config/solar_forecast_ml/exports/pictures/
    and can be displayed in Home Assistant using a local_file camera.

    Chart types:
    - daily: Forecast vs Actual for a specific day (default: today)
    - weekly: Weekly accuracy bar chart (last 7 days)
    - production_weather: Production vs Weather conditions (dual-axis chart)
    - monthly_heatmap: Monthly production heatmap showing daily patterns
    - sensor_correlation: Correlation between weather sensors and forecast accuracy

    The daily and production_weather charts are automatically generated at day-end (23:30).

    The generated chart can be viewed in Lovelace using:
    camera:
      - platform: local_file
        file_path: /config/solar_forecast_ml/exports/pictures/daily_forecast_YYYY-MM-DD.png

  fields:
    chart_type:
      description: Type of chart to generate
      example: "daily"
      default: "daily"
      selector:
        select:
          options:
            - "daily"
            - "weekly"
            - "production_weather"
            - "monthly_heatmap"
            - "sensor_correlation"
    date:
      description: Target date for daily/production_weather/monthly_heatmap chart (YYYY-MM-DD format). Default is today.
      example: "2025-11-08"
      selector:
        text: