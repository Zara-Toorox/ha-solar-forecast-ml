# WEATHER SERVICES - Weather Data Management
# ⚠️ DEVELOPER ONLY - Kann Wetterdaten und Caches überschreiben!
# ============================================================================

run_weather_correction:
  name: "🔄 Rebuild Corrected Weather Forecast"
  description: >
    ╔══════════════════════════════════════════════════════════════════════════╗
    ║ ⚠️ NUR FÜR ENTWICKLER / DEVELOPER ONLY                                  ║
    ║ Führen Sie diesen Service NUR auf Anweisung des Supports aus!           ║
    ║ Überschreibt existierende Wettervorhersage-Korrekturen!                 ║
    ╚══════════════════════════════════════════════════════════════════════════╝

    ⚠️ MANUAL TRIGGER - Rebuilds weather_forecast_corrected.json immediately!

    This service manually triggers the corrected weather forecast generation
    which normally runs automatically at 02:00 daily.

    What this does:
    1. Loads raw weather forecast from open_meteo_cache.json
    2. Loads precision correction factors from weather_precision_daily.json
    3. Loads astronomy data for clear_sky calculations
    4. Applies physics-based corrections (clear_sky × cloud_factor)
    5. Saves corrected forecast to weather_forecast_corrected.json

    Use this service:
    - To test weather correction logic immediately
    - If automatic 02:00 task failed
    - When you can't wait until 02:00 for new forecast

    Processing time: ~1 second

    Result file: /config/solar_forecast_ml/stats/weather_forecast_corrected.json

    IMPORTANT: This service will overwrite the existing corrected forecast!
  fields: {}

refresh_open_meteo_cache:
  name: "Refresh Open-Meteo Direct Radiation Cache"
  description: >
    ╔══════════════════════════════════════════════════════════════════════════╗
    ║ ⚠️ NUR FÜR ENTWICKLER / DEVELOPER ONLY                                  ║
    ║ Führen Sie diesen Service NUR auf Anweisung des Supports aus!           ║
    ╚══════════════════════════════════════════════════════════════════════════╝

    Manually refresh Open-Meteo direct radiation data!

    This service fetches fresh radiation forecasts from Open-Meteo API
    and updates the persistent cache (open_meteo_cache.json).

    What this does:
    1. Fetches 72-hour forecast from api.open-meteo.com
    2. Gets direct_radiation, diffuse_radiation, GHI (W/m2)
    3. Gets temperature, clouds, humidity, wind, precipitation
    4. Updates in-memory cache for immediate use
    5. Saves to open_meteo_cache.json (survives HA restarts)

    Direct Radiation Mode:
    - Uses GHI (Global Horizontal Irradiance) directly from API
    - No cloud-to-radiation calculation needed
    - More accurate than physics-based cloud models
    - GHI = direct_radiation + diffuse_radiation

    Automatic schedule:
    - 00:15 LOCAL: Daily update (with corrected forecast)
    - 12:15 LOCAL: Mid-day refresh

    Use this service when:
    - After HA restart if cache is stale (>12 hours old)
    - "Open-Meteo unavailable" warnings in logs
    - Want immediate weather/radiation data refresh

    Processing time: ~2-5 seconds (depends on API response)

    Result files:
    - /config/solar_forecast_ml/data/open_meteo_cache.json (persistent)
    - In-memory cache (immediate use in corrected forecast)

    API: api.open-meteo.com (free, no API key required)
  fields: {}

refresh_multi_weather:
  name: "🌤️ Refresh Multi-Weather Cache"
  description: >
    ╔══════════════════════════════════════════════════════════════════════════╗
    ║ ℹ️ SICHER / SAFE - Kann von Benutzern verwendet werden                   ║
    ║ Dieser Service aktualisiert nur Wetter-Caches.                          ║
    ╚══════════════════════════════════════════════════════════════════════════╝

    🌤️ Refresh Multi-Weather blended forecast (Open-Meteo + wttr.in)!

    This service fetches weather data from multiple sources and blends
    cloud cover predictions using learned accuracy weights.

    What this does:
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    1. Fetches 72-hour forecast from Open-Meteo (primary source)
    2. If cloud_cover > 50%: Also fetches from wttr.in (World Weather Online)
    3. Blends cloud_cover using learned weights (based on past accuracy)
    4. Saves blended forecast to open_meteo_cache.json
    5. Updates wttr_in_cache.json (6h cache, 12h fallback)

    Multi-Source Blending:
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    - Open-Meteo predicted 100% clouds, wttr.in predicted 35%
    - With learned weights (30% OM, 70% WWO): Blended = 54%
    - Actual was 10% → wttr.in was more accurate → Gets higher weight next time

    Cache Strategy:
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    - wttr.in cache: 6 hours (normal), 12 hours (fallback if API down)
    - Reduces API calls (wttr.in has ~100 req/hour limit)
    - Automatic retry with stale cache if API timeout

    Automatic schedule:
    - 06:00, 12:00, 18:00: Multi-Weather update (with trigger check)
    - 23:30: Weight learning from daily actual data

    Use this service when:
    - Want immediate Multi-Weather refresh
    - After configuration changes
    - To test blending logic

    Processing time: ~3-10 seconds (depends on API responses)

    Result files:
    - /config/solar_forecast_ml/data/open_meteo_cache.json (blended forecast)
    - /config/solar_forecast_ml/data/wttr_in_cache.json (wttr.in cache)
    - /config/solar_forecast_ml/data/weather_source_weights.json (learned weights)
  fields:
    force_wttr_refresh:
      name: "Force wttr.in Refresh"
      description: >
        Force a fresh API call to wttr.in even if the cache is still valid.
        Use this if you suspect the cache is outdated or want immediate fresh data.
        Default: false (uses cache if < 6 hours old)
      required: false
      default: false
      example: true
      selector:
        boolean:

bootstrap_physics_from_history:
  name: "🔬 Bootstrap Physics-First Models from History"
  description: >
    ╔══════════════════════════════════════════════════════════════════════════╗
    ║ 🚨 GEFÄHRLICH / DANGEROUS - NUR FÜR ENTWICKLER / DEVELOPER ONLY         ║
    ║ Führen Sie diesen Service NUR auf Anweisung des Supports aus!           ║
    ║ Kann existierende Modelle und gelernte Muster ÜBERSCHREIBEN!            ║
    ║ Erstellen Sie VORHER ein Home Assistant Backup!                         ║
    ╚══════════════════════════════════════════════════════════════════════════╝

    🔬 PHYSICS-FIRST BOOTSTRAP - Train GeometryLearner and ResidualTrainer from HA History!

    This service trains the Physics-First Architecture components using historical
    production data from Home Assistant combined with historical weather from Open-Meteo.

    ⚠️ REQUIREMENTS:
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    ✅ power_entity (required, already configured)
    ✅ solar_yield_today (required, already configured)
    ⭐ solar_radiation_sensor (optional, improves training)
    ⭐ lux_sensor (optional, for clear-sky detection)
    ⭐ temp_sensor (optional, for temperature correction)

    What this service does (8 steps):
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    1. ✅ Validates required sensor configuration
    2. 📊 Fetches production history from HA Recorder (up to 6 months)
    3. 📈 Aggregates hourly production from cumulative yield
    4. 🌤️ Fetches historical weather from Open-Meteo Archive API
    5. 🌞 Builds astronomy cache retroactively (sun positions)
    6. 📐 Builds training samples with production + weather + astronomy
    7. 🔬 Trains GeometryLearner (learns panel tilt/azimuth from clear-sky data)
    8. 🧠 Trains ResidualTrainer (learns ML corrections for Physics model)

    GeometryLearner Output:
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    - Learned panel tilt (e.g., 32.5°) from production patterns
    - Learned panel azimuth (e.g., 175°) from morning/afternoon production
    - Confidence score based on clear-sky sample count
    - Saved to: /config/solar_forecast_ml/learned_geometry.json

    ResidualTrainer Output:
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    - ML model trained on residuals (actual - physics prediction)
    - Captures local effects: shadows, obstructions, systematic errors
    - Algorithm: Ridge (fast) or TinyLSTM (accurate, 100+ samples)
    - Saved to: /config/solar_forecast_ml/ml/residual_model_state.json

    After bootstrap:
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    ✅ Physics-First architecture fully trained
    ✅ Panel geometry learned (no manual configuration needed!)
    ✅ ML residual model ready for ensemble predictions
    ✅ Forecasts immediately use Physics+ML combination

    Use this service:
    - After fresh installation with 1+ month of history
    - After reinstallation to quickly restore trained models
    - To retrain models with more historical data
    - When panel geometry may have changed (e.g., reinstallation)

    Processing time: 30-120 seconds (depends on days requested)

  fields:
    days:
      name: "Days to fetch"
      description: "Number of days to look back in history (1-365). Default: 180 days (6 months) for comprehensive training. GeometryLearner needs clear-sky days, so more history = better results."
      required: false
      default: 180
      example: 180
      selector:
        number:
          min: 7
          max: 365
          mode: slider
          unit_of_measurement: "days"
    cumulative_yield_sensor:
      name: "Cumulative Yield Sensor (optional)"
      description: >
        Optional: A CUMULATIVE total yield sensor (kWh) that is NOT reset daily.
        Use this if your solar_yield_today sensor doesn't have enough history.
        The service will calculate hourly production from the differences.
        Example: sensor.solar_total_yield or sensor.inverter_lifetime_production
      required: false
      example: "sensor.solar_total_yield"
      selector:
        entity:
          domain: sensor

bootstrap_from_history:
  name: "🚀 Bootstrap Pattern Learning from History"
  description: >
    ╔══════════════════════════════════════════════════════════════════════════╗
    ║ 🚨 GEFÄHRLICH / DANGEROUS - NUR FÜR ENTWICKLER / DEVELOPER ONLY         ║
    ║ Führen Sie diesen Service NUR auf Anweisung des Supports aus!           ║
    ║ Kann existierende gelernte Muster ÜBERSCHREIBEN!                        ║
    ║ Erstellen Sie VORHER ein Home Assistant Backup!                         ║
    ╚══════════════════════════════════════════════════════════════════════════╝

    🚀 ADVANCED - Bootstrap pattern learning from Home Assistant history!

    ⚠️ REQUIREMENTS:
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    ✅ Power sensor (required, already configured during setup)
    ✅ Yield sensor (required, already configured during setup)
    ⭐ Cumulative Yield sensor (optional, via service parameter)
    ⭐ Other sensors are OPTIONAL (solar_radiation, temperature, etc.)

    Optional sensors improve the quality of pattern learning but are NOT required!

    What this service does:
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    1. ✅ Validates required sensors (power + yield)
    2. 📊 Fetches sensor history from Home Assistant Recorder
    3. 📊 Optionally uses cumulative yield sensor for longer history
    4. 📝 Fills hourly_weather_actual.json
    5. 🧠 Calculates geometry_factors from actual production
    6. 📅 Learns seasonal_adjustments (monthly patterns)
    7. ⚡ Builds efficiency_curves (radiation vs output)
    8. 💾 Saves learned_patterns.json with real data

    After bootstrap:
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    ✅ learned_patterns.json has real data (not defaults!)
    ✅ hourly_weather_actual.json filled with historical data
    ✅ ML training can start immediately (if 100+ samples)
    ✅ Geometry corrections based on YOUR actual installation

    Processing time: ~10-30 seconds (depends on days requested)

    Result files:
    - /config/solar_forecast_ml/stats/hourly_weather_actual.json
    - /config/solar_forecast_ml/ml/learned_patterns.json

  fields:
    days:
      name: "Days to fetch"
      description: "Number of days to look back in history (1-180). Default: 30 days for comprehensive pattern learning."
      required: false
      default: 30
      example: 30
      selector:
        number:
          min: 1
          max: 180
          mode: slider
          unit_of_measurement: "days"
    cumulative_yield_sensor:
      name: "Cumulative Yield Sensor (optional)"
      description: >
        Optional: A CUMULATIVE total yield sensor (kWh) that is NOT reset daily.
        Use this if your solar_yield_today sensor doesn't have enough history.
        The service will calculate hourly production from the differences.
        Example: sensor.solar_total_yield or sensor.inverter_lifetime_production
      required: false
      example: "sensor.solar_total_yield"
      selector:
        entity:
          domain: sensor

send_daily_briefing:
  name: Send Daily Solar Briefing
  description: >
    ╔══════════════════════════════════════════════════════════════════════════╗
    ║ ℹ️ SICHER / SAFE - Kann von Benutzern verwendet werden                   ║
    ║ Dieser Service sendet nur Benachrichtigungen und ändert keine Daten.    ║
    ╚══════════════════════════════════════════════════════════════════════════╝

    ☀️ Send a daily solar weather briefing notification with today's forecast.

    This service generates and sends a formatted notification with:
    - Today's solar forecast (kWh prediction)
    - Weather interpretation (sunny, partly cloudy, etc.)
    - Comparison to yesterday's actual production
    - Best production time (Solar Noon)
    - Sunrise/Sunset times and daylight duration
    - Smart emoji indicators

    Perfect for morning routines to know what to expect from your solar system!

    Example notification:
    Title: "☀️ Solar Forecast - Samstag, 16. Nov"
    Message:
    "🌞 Guter Solar-Tag erwartet!

    📊 Forecast: 4.45 kWh
       → 6x besser als gestern (0.7 kWh)

    🌤️ Wetter: Sonnig bis teilweise bewölkt
       Beste Zeit: 10:51 Uhr (Solar Noon)

    ⏰ Tageslicht: 8h 35min
       🌅 Aufgang: 06:34 Uhr
       🌇 Untergang: 15:11 Uhr

    Viel Sonne heute! ☀️"

    Use this service:
    - In automations for daily morning notifications
    - Manually to check today's forecast briefing
    - With different notify services (mobile_app, persistent_notification, etc.)

    Tip: Create an automation that runs at 07:00 every morning!
  fields:
    notify_service:
      name: Mobile Device (Optional)
      description: >
        OPTIONAL: Add your mobile device to receive an additional push notification.

        - Leave EMPTY or use "persistent_notification": Full message in HA UI only (recommended for most users)
        - Enter "mobile_app_iphone" (or your device name): Get BOTH push notification + HA UI message

        The full briefing is ALWAYS shown in Home Assistant UI (notification bell icon).

        To find your device name: Go to Developer Tools > Services and search for "notify.mobile_app"
      example: "mobile_app_iphone"
      default: "persistent_notification"
      required: false
      selector:
        text:
    language:
      name: Language
      description: Language for the notification text (de=German, en=English)
      example: "de"
      default: "de"
      required: false
      selector:
        select:
          options:
            - label: "Deutsch"
              value: "de"
            - label: "English"
              value: "en"

