discover_battery_sensors:
  name: "Batterie-Sensoren automatisch erkennen"
  description: >
    ╔══════════════════════════════════════════════════════════════════════════╗
    ║ ⚠️ NUR FÜR ENTWICKLER / DEVELOPER ONLY                                  ║
    ║ Führen Sie diesen Service NUR auf Anweisung des Supports aus!           ║
    ║ Mit auto_apply=true wird die Konfiguration automatisch geändert!        ║
    ╚══════════════════════════════════════════════════════════════════════════╝

    🔋 Erkennt automatisch kompatible Batterie-Sensoren von unterstützten Integrationen.

    Unterstützte Integrationen:
    - Anker Solix (anker_solix)
    - Huawei Solar (huawei_solar)
    - Fronius (fronius)

    Wenn keine Integration angegeben wird, werden alle unterstützten Integrationen durchsucht.

    Die erkannten Sensoren können dann manuell in der Integration konfiguriert oder mit
    auto_apply=true automatisch eingetragen werden.

    Tipp: Verwenden Sie stattdessen auto_configure_battery für eine vollautomatische Konfiguration!
  fields:
    integration:
      name: "Integration"
      description: "Name der Integration (optional). Wenn nicht angegeben, werden alle unterstützten Integrationen durchsucht."
      required: false
      example: "anker_solix"
      selector:
        select:
          options:
            - "anker_solix"
            - "huawei_solar"
            - "fronius"
    auto_apply:
      name: "Automatisch anwenden"
      description: "Wenn aktiviert, werden die erkannten Sensoren automatisch in die Konfiguration eingetragen (Standard: false)"
      required: false
      default: false
      example: true
      selector:
        boolean:

auto_configure_battery:
  name: "🚀 Batterie-Sensoren automatisch konfigurieren (1-Klick)"
  description: >
    ╔══════════════════════════════════════════════════════════════════════════╗
    ║ 🚨 GEFÄHRLICH / DANGEROUS - NUR FÜR ENTWICKLER / DEVELOPER ONLY         ║
    ║ Führen Sie diesen Service NUR auf Anweisung des Supports aus!           ║
    ║ ÄNDERT AUTOMATISCH Ihre Home Assistant Konfiguration!                   ║
    ║ Die Integration wird automatisch neu geladen!                           ║
    ╚══════════════════════════════════════════════════════════════════════════╝

    🎯 ONE-CLICK LÖSUNG - Erkennt UND konfiguriert Batterie-Sensoren vollautomatisch!

    Was dieser Service macht:
    1. Sucht nach unterstützten Integrationen (Anker Solix, Huawei Solar, Fronius)
    2. Erkennt automatisch alle kompatiblen Sensoren
    3. Validiert die erkannten Sensoren
    4. Trägt die Sensoren AUTOMATISCH in Ihre Solar Forecast ML Konfiguration ein
    5. Lädt die Integration neu, um die Änderungen zu aktivieren

    ✨ Einfachste Methode - Nur 1 Klick!

    Nach erfolgreicher Konfiguration:
    - Batterie-Management ist aktiviert (v9.0.0 System)
    - Energiefluss-Tracking ist aktiv
    - Alle Batterie-Sensoren werden überwacht

    WICHTIG: Dieser Service ändert Ihre Konfiguration. Die Integration wird automatisch neu geladen.

    Unterstützte Integrationen:
    - Anker Solix (anker_solix)
    - Huawei Solar (huawei_solar)
    - Fronius (fronius)
  fields:
    integration:
      name: "Integration (optional)"
      description: "Name der Integration. Wenn nicht angegeben, wird automatisch nach allen unterstützten Integrationen gesucht."
      required: false
      example: "anker_solix"
      selector:
        select:
          options:
            - "anker_solix"
            - "huawei_solar"
            - "fronius"

validate_battery_sensors:
  name: "Batterie-Sensoren validieren"
  description: >
    ╔══════════════════════════════════════════════════════════════════════════╗
    ║ ⚠️ NUR FÜR ENTWICKLER / DEVELOPER ONLY                                  ║
    ║ Führen Sie diesen Service NUR auf Anweisung des Supports aus!           ║
    ║ Keine Änderungen am System (read-only).                                 ║
    ╚══════════════════════════════════════════════════════════════════════════╝

    ✅ Validiert die Konfiguration der Batterie-Sensoren.

    Prüft ob:
    - Alle erforderlichen Sensoren vorhanden sind
    - Die Sensoren in Home Assistant existieren
    - Die Sensoren gültige Werte liefern

    Nützlich nach der Auto-Discovery um sicherzustellen, dass alle Sensoren korrekt erkannt wurden.
  fields:
    battery_power_sensor:
      name: "Batterie Leistungssensor"
      description: "Sensor für Batterie-Leistung (W, positiv=laden, negativ=entladen)"
      required: true
      example: "sensor.anker_charging_power"
      selector:
        entity:
          domain: sensor
    battery_soc_sensor:
      name: "Batterie SOC Sensor"
      description: "Sensor für Ladezustand (State of Charge) in Prozent (0-100%)"
      required: true
      example: "sensor.anker_state_of_charge"
      selector:
        entity:
          domain: sensor
    solar_production_sensor:
      name: "Solar Produktionssensor"
      description: "Sensor für Solar-Produktion in Watt (≥0)"
      required: true
      example: "sensor.anker_input_power"
      selector:
        entity:
          domain: sensor
    inverter_output_sensor:
      name: "Wechselrichter Ausgangssensor"
      description: "Sensor für Wechselrichter AC-Ausgang in Watt (≥0)"
      required: true
      example: "sensor.anker_output_power"
      selector:
        entity:
          domain: sensor
    house_consumption_sensor:
      name: "Hausverbrauchssensor"
      description: "Sensor für Hausverbrauch in Watt (≥0)"
      required: true
      example: "sensor.anker_home_load_power"
      selector:
        entity:
          domain: sensor
    grid_import_sensor:
      name: "Netzbezugssensor"
      description: "Sensor für Netzbezug (Strom aus dem Netz) in Watt (≥0)"
      required: true
