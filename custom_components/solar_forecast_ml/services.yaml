test_morning_routine:
  name: "🧪 TEST: Analyze 6 AM Morning Predictions (Real Data)"
  description: >
    ╔══════════════════════════════════════════════════════════════════════════╗
    ║ ⚠️ NUR FÜR ENTWICKLER / DEVELOPER ONLY                                  ║
    ║ Dieser Service ist nur für Debugging-Zwecke gedacht.                    ║
    ║ Keine Änderungen am System (read-only).                                 ║
    ╚══════════════════════════════════════════════════════════════════════════╝

    ⚠️ ANALYSIS SERVICE - No backup needed (read-only!)

    Analyzes the ACTUAL data that was used at 6:00 AM today.

    Code Reference: services/service_registry.py::_handle_test_morning_routine

    What this service does:
    1. Loads stored predictions from hourly_predictions.json (created at 06:00)
    2. Loads weather data from weather_cache.json (fetched at 06:00)
    3. Analyzes predicted best hour vs actual best hour
    4. Shows prediction accuracy and errors
    5. Compares ML/Rule blending effectiveness

    This service is READ-ONLY and uses REAL stored data from this morning's
    06:00 routine. Perfect for debugging why a certain hour was predicted
    as best.

